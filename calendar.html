<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#050C1C;--dark-deep:#030912;--cyan:#7DF9FF;--white:#FFFFFF;--text-on-dark:#B8C4D0;--font-body:'DM Sans',-apple-system,sans-serif;--max-w:1080px}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--white);color:#222;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--dark);border-bottom:1px solid rgba(255,255,255,.05);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.4)}
.nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 clamp(1.25rem,4vw,2.5rem);display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo img{height:38px;width:auto}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
.nav-links a{color:var(--text-on-dark);font-size:.9rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-links .dropdown{position:relative}
.nav-links .dropdown-menu{position:absolute;top:calc(100% + 8px);left:-.75rem;background:var(--dark-deep);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.5rem 0;min-width:180px;opacity:0;visibility:hidden;transform:translateY(4px);transition:all .2s;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.nav-links .dropdown:hover .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-menu a{display:block;padding:.55rem 1rem;font-size:.85rem}
.nav-phone{color:var(--text-on-dark);font-weight:500;font-size:.9rem;white-space:nowrap;transition:color .2s}
.nav-phone:hover{color:var(--white)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--white);border-radius:2px;transition:all .3s}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;bottom:0;background:var(--dark-deep);z-index:99;padding:2rem 1.5rem;overflow-y:auto}
.mobile-menu.open{display:block}
.mobile-menu a{display:block;color:var(--text-on-dark);font-size:1.05rem;padding:.85rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-weight:500}
.mobile-menu a:hover{color:var(--white)}
.mobile-menu .sub-link{padding-left:1rem;font-size:.95rem;color:#8899AA}
.mobile-menu .mobile-phone{display:inline-block;margin-top:1.5rem;color:var(--cyan);font-weight:600;font-size:1.1rem;border-bottom:none}
.cal-container{padding-top:64px;width:100%;min-height:calc(100vh - 64px)}
#my-cal-inline-consultation{width:100%;height:100%;min-height:calc(100vh - 64px);overflow:auto}
.footer-mini{text-align:center;padding:1.5rem clamp(1.25rem,4vw,2.5rem);font-size:.8rem;color:#999;background:var(--white)}
.footer-mini a{color:#666}
.footer-mini a:hover{color:#222}
@media(max-width:768px){
  .nav-links{display:none}.nav-phone-desktop{display:none}.hamburger{display:flex}
}
</style>
